<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stem Viewer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header: Song Title and Metadata -->
        <header class="song-header">
            <h1 class="song-title">Song Title</h1>
            <div class="song-meta">
                <span class="artist-name">Artist Name</span>
                <span class="separator">•</span>
                <span class="bpm">120 BPM</span>
                <span class="separator">•</span>
                <span class="duration">3:45</span>
            </div>
        </header>

        <!-- Waveform Area with Integrated Stem Controls -->
        <div class="waveform-container">
            <!-- Section markers appear above the waveform -->
            <div class="section-markers-row">
                <div class="markers-spacer"></div>
                <div class="section-markers">
                    <!-- Populated dynamically from manifest.json -->
                </div>
            </div>

            <div class="waveform-content">
                <div class="waveform-spacer">
                    <!-- Left sidebar with stem controls -->
                    <div class="stems-sidebar">
                        <!-- Populated dynamically from manifest.json -->
                    </div>
                </div>

                <div class="waveform-canvas-wrapper">
                    <!-- Main waveform canvas -->
                    <canvas id="waveform-canvas" draggable="false"></canvas>

                    <!-- Playhead indicator -->
                    <div class="playhead" id="playhead"></div>

                    <!-- Hover line -->
                    <div class="hover-line" id="hover-line"></div>

                    <!-- Time display overlay -->
                    <div class="time-display">
                        <span class="current-time">0:00</span>
                        <span class="time-separator">/</span>
                        <span class="total-time">3:45</span>
                        <span class="current-bar">Bar 1</span>
                    </div>

                    <!-- Hover tooltip -->
                    <div class="waveform-tooltip" id="waveform-tooltip">
                        <div class="tooltip-time">0:00</div>
                        <div class="tooltip-bar">Bar 1.1</div>
                    </div>
                </div>
            </div>

            <!-- Time Ruler -->
            <div class="time-ruler-row">
                <div class="ruler-spacer"></div>
                <div class="time-ruler" id="time-ruler">
                    <!-- Bar/time markers will be drawn here by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Transport Controls -->
        <div class="transport-controls">
            <button class="control-btn" id="play-btn" title="Play">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z" />
                </svg>
            </button>
            <button class="control-btn" id="stop-btn" title="Stop" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h12v12H6z" />
                </svg>
            </button>
        </div>

        <!-- Metadata Info -->
        <div class="metadata-info">
            <div class="metadata-grid">
                <!-- Populated dynamically from manifest.json -->
            </div>
        </div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
